name: Kronos Report & Trading (08:00 Italia)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
  SMTP_TO: ${{ secrets.SMTP_TO }}
  SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
  SMTP_PORT: ${{ secrets.SMTP_PORT }}
  ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
  ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
  ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}

jobs:
  reports:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ticker: [BAMI.MI, BMPS.MI, ISP.MI, UNI.MI, LDO.MI, GC=F]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Report ${{ matrix.ticker }}
        run: python report_azioni.py ${{ matrix.ticker }}

      - name: Upload ${{ matrix.ticker }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-${{ matrix.ticker }}
          path: Report_${{ matrix.ticker }}.html
          retention-days: 7

  trading:
    needs: reports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Esegui trading agent
        run: python trader.py BAMI.MI BMPS.MI ISP.MI UNI.MI LDO.MI
