name: Kronos Daily Trade Signal

on:
  schedule:
    # 06:00 UTC = 08:00 Italia (CEST, +2h)
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily trade signal (9 assets → email)
        run: python daily_trade.py
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          REPORT_DIR: Report_Giornalieri_Btc

      - name: Upload reports artefatti
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-reports
          path: Report_Giornalieri_Btc/
          retention-days: 7
